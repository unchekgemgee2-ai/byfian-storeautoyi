<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByFian Store | Auto Order System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #020617; 
            color: #f8fafc; 
            background-image: radial-gradient(circle at top right, #1e3a8a 0%, transparent 20%), radial-gradient(circle at bottom left, #4c1d95 0%, transparent 20%);
        }
        .btn-gg { background: linear-gradient(135deg, #2563eb, #7c3aed); transition: 0.3s; }
        .btn-gg:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5); }
        .card-item { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .card-item:hover { border-color: #3b82f6; background: rgba(59, 130, 246, 0.05); }
    </style>
</head>
<body class="pb-32">

    <nav class="p-6 flex justify-between items-center sticky top-0 bg-[#020617]/90 backdrop-blur-md z-50 border-b border-white/5">
        <h1 class="font-black italic text-xl tracking-tighter text-blue-500">FIAN STORE</h1>
        <span class="text-[9px] font-black bg-green-500/10 text-green-500 px-3 py-1 rounded-full border border-green-500/20 animate-pulse">AUTO SYSTEM ON</span>
    </nav>

    <div class="max-w-md mx-auto px-6 mt-8">
        <div class="relative mb-10">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xs"></i>
            <input type="text" id="searchInput" onkeyup="searchMenu()" placeholder="Cari layanan..." class="w-full py-4 pl-12 pr-4 rounded-2xl bg-white/5 border border-white/10 outline-none text-xs focus:border-blue-500">
        </div>

        <div id="fullMenu" class="space-y-12">
            
            <section>
                <p class="text-[11px] font-black text-blue-500 uppercase tracking-widest mb-4 italic"><i class="fas fa-gamepad mr-2"></i> Diamond Mobile Legends</p>
                <div class="space-y-3">
                    <div class="card-item p-4 flex justify-between items-center rounded-2xl">
                        <div><p class="text-xs font-bold">50 Diamond ML</p><p class="text-[10px] text-blue-400 font-bold">Rp 15.000</p></div>
                        <button onclick="orderProcess('ML50', '50 Diamond ML')" class="btn-gg px-6 py-2 rounded-xl text-[10px] font-black uppercase text-white">Beli</button>
                    </div>
                    <div class="card-item p-4 flex justify-between items-center rounded-2xl">
                        <div><p class="text-xs font-bold">100 Diamond ML</p><p class="text-[10px] text-blue-400 font-bold">Rp 28.000</p></div>
                        <button onclick="orderProcess('ML100', '100 Diamond ML')" class="btn-gg px-6 py-2 rounded-xl text-[10px] font-black uppercase text-white">Beli</button>
                    </div>
                </div>
            </section>

            <section>
                <p class="text-[11px] font-black text-red-500 uppercase tracking-widest mb-4 italic"><i class="fas fa-fire mr-2"></i> Diamond Free Fire</p>
                <div class="space-y-3">
                    <div class="card-item p-4 flex justify-between items-center rounded-2xl">
                        <div><p class="text-xs font-bold">70 Diamond FF</p><p class="text-[10px] text-red-400 font-bold">Rp 10.000</p></div>
                        <button onclick="orderProcess('FF70', '70 Diamond FF')" class="btn-gg px-6 py-2 rounded-xl text-[10px] font-black uppercase text-white">Beli</button>
                    </div>
                </div>
            </section>

            <section>
                <p class="text-[11px] font-black text-yellow-500 uppercase tracking-widest mb-4 italic"><i class="fas fa-crown mr-2"></i> Jabatan Premium</p>
                <div class="space-y-3">
                    <div class="card-item p-4 flex justify-between items-center rounded-2xl">
                        <div><p class="text-xs font-bold">MANAGER SVIP</p><p class="text-[10px] text-yellow-500 font-bold">Rp 15.000</p></div>
                        <button onclick="orderProcess('MGR_SVIP', 'MANAGER SVIP')" class="btn-gg px-6 py-2 rounded-xl text-[10px] font-black uppercase text-white">Beli</button>
                    </div>
                    <div class="card-item p-4 flex justify-between items-center rounded-2xl">
                        <div><p class="text-xs font-bold">OWNER STORE</p><p class="text-[10px] text-yellow-500 font-bold">Rp 10.000</p></div>
                        <button onclick="orderProcess('OWNER_S', 'OWNER STORE')" class="btn-gg px-6 py-2 rounded-xl text-[10px] font-black uppercase text-white">Beli</button>
                    </div>
                </div>
            </section>

            <section>
                <p class="text-[11px] font-black text-green-500 uppercase tracking-widest mb-4 italic"><i class="fas fa-server mr-2"></i> GB Panel System</p>
                <div class="space-y-3">
                    <div class="card-item p-4 flex justify-between items-center rounded-2xl">
                        <div><p class="text-xs font-bold">PANEL 1 GB</p><p class="text-[10px] text-green-500 font-bold">Rp 1.000</p></div>
                        <button onclick="orderProcess('PNL1', 'PANEL 1 GB')" class="btn-gg px-6 py-2 rounded-xl text-[10px] font-black uppercase text-white">Beli</button>
                    </div>
                </div>
            </section>

        </div>
    </div>

    <script>
        // GANTI LINK DI BAWAH INI DENGAN LINK DARI CLOUDFLARE TERMUX BOS
        const TUNNEL_URL = 'https://pete-wins-nam-jesus.trycloudflare.com'; 

        async function orderProcess(sku, name) {
            const { value: targetID } = await Swal.fire({
                title: 'Konfirmasi Order',
                text: `Masukkan ID/Tujuan untuk ${name}`,
                input: 'text',
                inputPlaceholder: 'Contoh: 12345678(2001)',
                showCancelButton: true,
                background: '#020617',
                color: '#fff',
                confirmButtonColor: '#3b82f6'
            });

            if (targetID) {
                Swal.fire({
                    title: 'Processing...',
                    text: 'Menghubungkan ke API Vip Reseller',
                    allowOutsideClick: false,
                    background: '#020617', color: '#fff',
                    didOpen: () => { Swal.showLoading(); }
                });

                try {
                    const response = await fetch(`${TUNNEL_URL}/order`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ service: sku, target: targetID })
                    });

                    const res = await response.json();
                    if (res.status === true) {
                        Swal.fire({ icon: 'success', title: 'Berhasil!', text: res.message, background: '#020617', color: '#fff' });
                    } else {
                        Swal.fire({ icon: 'error', title: 'Gagal', text: res.message || 'Cek Saldo/IP!', background: '#020617', color: '#fff' });
                    }
                } catch (err) {
                    Swal.fire({ icon: 'error', title: 'Error', text: 'Pastikan Termux & Tunnel Aktif!', background: '#020617', color: '#fff' });
                }
            }
        }

        function searchMenu() {
            let input = document.getElementById('searchInput').value.toUpperCase();
            let cards = document.getElementsByClassName('card-item');
            for (let i = 0; i < cards.length; i++) {
                cards[i].style.display = cards[i].innerText.toUpperCase().includes(input) ? "" : "none";
            }
        }
    </script>
</body>
  </html>
